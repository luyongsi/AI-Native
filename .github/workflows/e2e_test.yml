name: Phase 6 E2E Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run E2E tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHONUNBUFFERED: 1
  LOG_LEVEL: INFO

jobs:
  e2e_test:
    name: Run Phase 6 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 540  # 9 hours

    services:
      postgres:
        image: pgvector/pgvector:pg15-latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_native
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      nats:
        image: nats:latest
        options: >-
          --health-cmd="nats-cli --server nats://127.0.0.1:4222 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4222:4222

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout asyncpg nats-py redis pydantic

          # Install project dependencies
          for req_file in repos/*/requirements.txt; do
            if [ -f "$req_file" ]; then
              pip install -r "$req_file" || true
            fi
          done

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until nc -z localhost 5432; do
            sleep 1
          done

          echo "Waiting for NATS..."
          until nc -z localhost 4222; do
            sleep 1
          done

          echo "Waiting for Redis..."
          until nc -z localhost 6379; do
            sleep 1
          done

          echo "All services ready"

      - name: Initialize database
        env:
          PGPASSWORD: postgres
        run: |
          # Create extensions and schema
          psql -h localhost -U postgres -d ai_native < repos/infra/init-db.sql || true

          # Run migrations
          for migration in repos/infra/migrations/*.sql; do
            if [ -f "$migration" ]; then
              psql -h localhost -U postgres -d ai_native < "$migration" || true
            fi
          done

      - name: Create test directory structure
        run: |
          mkdir -p tests/integration
          touch tests/integration/__init__.py

      - name: Run Scenario 1 (Simple requirement)
        timeout-minutes: 130  # 2h 10m with buffer
        continue-on-error: true
        run: |
          cd tests/integration
          python -m pytest test_e2e_phase6.py::TestE2EPhase6::test_scenario_1_simple_requirement -v -s --tb=short
        env:
          NATS_URL: nats://localhost:4222
          DB_URL: postgresql://postgres:postgres@localhost:5432/ai_native
          REDIS_URL: redis://localhost:6379

      - name: Run Scenario 2 (Medium requirement)
        timeout-minutes: 490  # 8h 10m with buffer
        continue-on-error: true
        run: |
          cd tests/integration
          python -m pytest test_e2e_phase6.py::TestE2EPhase6::test_scenario_2_medium_requirement -v -s --tb=short
        env:
          NATS_URL: nats://localhost:4222
          DB_URL: postgresql://postgres:postgres@localhost:5432/ai_native
          REDIS_URL: redis://localhost:6379

      - name: Run Scenario 3 (Complex requirement)
        timeout-minutes: 60  # 1h - shorter timeout for initial run
        continue-on-error: true
        run: |
          cd tests/integration
          python -m pytest test_e2e_phase6.py::TestE2EPhase6::test_scenario_3_complex_requirement -v -s --tb=short
        env:
          NATS_URL: nats://localhost:4222
          DB_URL: postgresql://postgres:postgres@localhost:5432/ai_native
          REDIS_URL: redis://localhost:6379

      - name: Generate test report
        if: always()
        run: |
          cd tests/integration
          python -c "
          import sys
          sys.path.insert(0, '.')
          from report_generator import ReportGenerator

          # Create a simple report template
          summary = {
              'total_tests': 3,
              'scenarios': ['Simple', 'Medium', 'Complex'],
          }

          report = '''
          # Phase 6 E2E Test Report

          Tests have been executed. Check test output for detailed results.

          - Scenario 1 (Simple): Check test log
          - Scenario 2 (Medium): Check test log
          - Scenario 3 (Complex): Check test log
          '''

          with open('e2e_test_report.md', 'w') as f:
              f.write(report)

          print('Report generated: e2e_test_report.md')
          " || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-results
          path: |
            tests/integration/e2e_test_report.md
            .pytest_cache/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-logs
          path: |
            tests/integration/*.log
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results.xml
          if-no-files-found: ignore

  lint_and_type_check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install pylint flake8 mypy

      - name: Lint test code
        run: |
          flake8 tests/integration/*.py --max-line-length=100 --ignore=E501,W503
        continue-on-error: true

      - name: Type check
        run: |
          mypy tests/integration/ --ignore-missing-imports
        continue-on-error: true

  report_summary:
    name: Test Report Summary
    runs-on: ubuntu-latest
    needs: [e2e_test, lint_and_type_check]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create summary
        run: |
          echo "## Phase 6 E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Execution Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "e2e-test-results/e2e_test_report.md" ]; then
            cat e2e-test-results/e2e_test_report.md >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [Test Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'e2e-test-results/e2e_test_report.md';
            let report = 'Phase 6 E2E tests completed.';

            if (fs.existsSync(reportPath)) {
              report = fs.readFileSync(reportPath, 'utf8');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report,
            });

apiVersion: v1
kind: Namespace
metadata:
  name: ai-native

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: visagent-config
  namespace: ai-native
data:
  LLM_PROVIDER: "qwen"
  LLM_MODEL: "qwen-vl-max"
  LLM_BASE_URL: "https://dashscope.aliyuncs.com/api/v1"
  NATS_URL: "nats://nats.ai-native.svc.cluster.local:4222"
  VISAGENT_HEALTH_PORT: "8080"
  VISAGENT_DEV_MODE: "true"
  S3_BUCKET: "visagent-screenshots"
  S3_REGION: "us-east-1"

---
apiVersion: v1
kind: Secret
metadata:
  name: visagent-secrets
  namespace: ai-native
type: Opaque
stringData:
  QWEN_API_KEY: "placeholder-qwen-api-key"
  S3_ACCESS_KEY: "placeholder-s3-access-key"
  S3_SECRET_KEY: "placeholder-s3-secret-key"
  MCP_GATEWAY_PUBLIC_KEY: "placeholder-mcp-public-key"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visagent
  namespace: ai-native
  labels:
    app: visagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visagent
  template:
    metadata:
      labels:
        app: visagent
    spec:
      containers:
        - name: visagent
          image: visagent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: visagent-config
            - secretRef:
                name: visagent-secrets
          env:
            - name: VISAGENT_DEV_MODE
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

        - name: nats-bridge
          image: visagent-nats-bridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: bridge-http
          envFrom:
            - configMapRef:
                name: visagent-config
          env:
            - name: HEALTH_PORT
              value: "8081"
            - name: VISAGENT_URL
              value: "http://localhost:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: visagent
  namespace: ai-native
  labels:
    app: visagent
spec:
  type: ClusterIP
  selector:
    app: visagent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: bridge
      port: 8081
      targetPort: 8081
      protocol: TCP

groups:
  - name: ai_native_alerts
    interval: 30s
    rules:
      # Agent 执行失败率过高
      - alert: HighAgentFailureRate
        expr: |
          rate(agent_executions_total{status="failed"}[5m])
          / rate(agent_executions_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "Agent {{ $labels.agent_id }} 失败率过高"
          description: "Agent {{ $labels.agent_id }} 在过去 5 分钟内失败率为 {{ $value | humanizePercentage }}"

      # LLM 调用延迟过高
      - alert: HighLLMLatency
        expr: |
          histogram_quantile(0.95,
            rate(llm_call_duration_seconds_bucket[5m])
          ) > 30
        for: 5m
        labels:
          severity: warning
          component: llm
        annotations:
          summary: "LLM 调用延迟过高"
          description: "P95 延迟为 {{ $value }}s，超过 30s 阈值"

      # Context Builder 耗时过长
      - alert: SlowContextBuilder
        expr: |
          histogram_quantile(0.95,
            rate(context_builder_total_duration_seconds_bucket[5m])
          ) > 10
        for: 3m
        labels:
          severity: info
          component: context_builder
        annotations:
          summary: "Context Builder 耗时过长"
          description: "P95 耗时 {{ $value }}s，可能影响用户体验"

      # NATS 连接断开
      - alert: NATSConnectionDown
        expr: nats_connected == 0
        for: 1m
        labels:
          severity: critical
          component: nats
        annotations:
          summary: "NATS 连接断开"
          description: "服务 {{ $labels.instance }} 的 NATS 连接已断开"

      # PostgreSQL 连接池耗尽
      - alert: PostgreSQLPoolExhausted
        expr: |
          pg_stat_activity_count
          / pg_settings_max_connections > 0.8
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL 连接池接近耗尽"
          description: "当前使用 {{ $value | humanizePercentage }} 连接"

      # Redis 内存使用过高
      - alert: HighRedisMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "Redis 内存使用过高"
          description: "内存使用率 {{ $value | humanizePercentage }}"

      # 原有规则保留
      - alert: AgentStuck
        expr: agent_executions_total{status="running"} > 0 and time() - agent_executions_total{status="running"} > 1800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent may be stuck"
          description: "Agent {{ $labels.agent_id }} has been running for >30min"

      - alert: LoopTripped
        expr: rate(loop_tripped_total[10m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker tripped"
          description: "Loop tripped for scope {{ $labels.scope }}"

      - alert: GateSLAOverdue
        expr: approvals_by_status{status="overdue"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Gate SLA overdue"
          description: "{{ $value }} gate(s) are overdue"

      - alert: HighWIP
        expr: requirements_by_status{status="developing"} > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "WIP limit exceeded"
          description: "{{ $value }} requirements in developing status"

      - alert: ZeroThroughput
        expr: rate(requirements_created_total[1h]) == 0 and rate(agent_executions_total[1h]) > 0
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "No new requirements in 1h"
          description: "Pipeline may be blocked"

      - alert: WebSocketConnectionDrop
        expr: delta(ws_connections_active[5m]) < -10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections dropping"
          description: "{{ $value }} connections dropped in 5min"

      - alert: HighEventBusLatency
        expr: rate(eventbus_messages_total[5m]) < 0.01 and agent_executions_total > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low event bus throughput"
          description: "Event bus message rate is very low"

      - alert: DatabaseConnectionPoolExhausted
        expr: requirements_by_status > 0 unless agent_executions_total{status="running"} > 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "No agent activity with pending work"
          description: "System may be stuck"

      - alert: TestFailureSpike
        expr: rate(eventbus_messages_total{event_type="test.failed"}[10m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Test failure rate increasing"
          description: "{{ $value }} test failures per second"

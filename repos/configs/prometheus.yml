global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # MC Backend metrics (宿主机进程, 通过 host.docker.internal 访问)
  - job_name: 'mc-backend'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
